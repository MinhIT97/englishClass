name: Auto Deploy

on:
  push:
    branches:
      - master

jobs:
  deploy:
    runs-on: self-hosted
    timeout-minutes: 30

    steps:
      - name: Pull latest code
        run: |
          cd /home/minhnv/projects/englishClass
          git fetch origin master
          git reset --hard origin/master

      - name: Build & start containers
        run: |
          cd /home/minhnv/projects/englishClass
          docker compose up -d --build --remove-orphans

      - name: Show startup logs
        run: |
          cd /home/minhnv/projects/englishClass
          echo "Waiting 45s for containers to initialize..."
          sleep 45
          echo "--- Container Status ---"
          docker compose ps
          echo ""
          echo "--- App Logs ---"
          docker compose logs --tail=60 app

      - name: Verify containers are up
        run: |
          cd /home/minhnv/projects/englishClass
          APP_STATUS=$(docker compose ps app --format "{{.State}}" 2>/dev/null || docker compose ps app | tail -1)
          echo "App status: $APP_STATUS"
          if docker compose ps app | grep -E "Exit|Error|Restarting"; then
            echo "❌ App container is not healthy!"
            docker compose logs app
            exit 1
          fi
          echo "✅ All containers are running!"
          docker compose ps

      - name: Cleanup old images
        run: docker image prune -af || true

      - name: Deploy success
        run: echo "✅ Deploy completed successfully!"
