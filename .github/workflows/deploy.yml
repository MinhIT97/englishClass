name: Auto Deploy

on:
  push:
    branches:
      - master

jobs:
  deploy:
    runs-on: self-hosted
    timeout-minutes: 30

    steps:
      - name: Pull latest code
        run: |
          cd /home/minhnv/projects/englishClass
          # Sửa lỗi Permission bằng Docker (do GitHub Action không có quyền sudo có pass)
          # Chạy một container tạm thời để trả lại quyền sở hữu cho user hiện tại
          docker run --rm -v $(pwd):/app alpine chown -R $(id -u):$(id -g) /app
          git fetch origin master
          git reset --hard origin/master

      - name: Build & start containers
        run: |
          cd /home/minhnv/projects/englishClass
          # Sử dụng lệnh deploy.sh đã tối ưu hoặc chạy trực tiếp docker-compose
          docker compose up -d --build --remove-orphans --scale queue=4

      - name: Clear Laravel cache
        run: |
          cd /home/minhnv/projects/englishClass
          docker compose exec -T app php artisan optimize:clear

      - name: Run migrations
        run: |
          cd /home/minhnv/projects/englishClass
          docker compose exec -T app php artisan migrate --force

      - name: Restart Laravel Queue
        run: |
          cd /home/minhnv/projects/englishClass
          docker compose exec -T app php artisan queue:restart

      - name: Restart Reverb
        run: |
          cd /home/minhnv/projects/englishClass
          docker compose restart reverb

      - name: Show startup logs
        run: |
          cd /home/minhnv/projects/englishClass
          docker compose ps
          docker compose logs --tail=60 app

      - name: Verify containers are up
        run: |
          cd /home/minhnv/projects/englishClass
          if docker compose ps | grep -E "Exit|Error|Restarting"; then
            echo "❌ Container error detected"
            docker compose logs
            exit 1
          fi
          echo "✅ All containers are running!"

      - name: Verify Health and Notify Telegram
        run: |
          cd /home/minhnv/projects/englishClass

          # 1. Get Health Status from /up (Laravel 11 default health check)
          HEALTH_RESPONSE=$(curl -s http://localhost/up || echo '{"status":"failed"}')

          # 2. Determine final status
          if echo "$HEALTH_RESPONSE" | grep -q "OK"; then
            DEPLOY_STATUS="success"
            HEALTH_JSON='{"app":"ok","db":"ok","redis":"ok"}'
          else
            DEPLOY_STATUS="failed"
            HEALTH_JSON='{"app":"failed"}'
          fi

          # 3. Send Notification to Telegram via Laravel API
          curl -X POST http://localhost/api/deploy/notify \
            -H "Content-Type: application/json" \
            -d "{
              \"status\": \"$DEPLOY_STATUS\",
              \"branch\": \"${{ github.ref_name }}\",
              \"commit\": \"${{ github.sha }}\",
              \"health\": $HEALTH_JSON
            }"

      - name: Cleanup old images
        run: docker image prune -af || true

      - name: Deploy success
        run: echo "✅ Deploy completed successfully!"
