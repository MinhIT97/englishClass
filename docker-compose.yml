version: '3.9'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: english-class-app
    working_dir: /app
    volumes:
      - ./:/app
      - ./storage:/app/storage
      - ./bootstrap/cache:/app/bootstrap/cache
    networks:
      - english-network
    depends_on:
      - db
    environment:
      - DB_HOST=db
      - DB_PORT=3306
      - DB_DATABASE=${DB_DATABASE:-englishclass}
      - DB_USERNAME=${DB_USERNAME:-root}
      - DB_PASSWORD=${DB_PASSWORD:-password}

  nginx:
    image: nginx:alpine
    container_name: english-class-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./:/app
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    networks:
      - english-network
    depends_on:
      - app

  db:
    image: mysql:8.0
    container_name: english-class-db
    ports:
      - "3307:3306"
    environment:
      MYSQL_DATABASE: ${DB_DATABASE:-englishclass}
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-password}
      MYSQL_PASSWORD: ${DB_PASSWORD:-password}
      MYSQL_USER: ${DB_USERNAME:-root}
    volumes:
      - dbdata:/var/lib/mysql
    networks:
      - english-network

  redis:
    image: redis:7-alpine
    container_name: english-class-redis
    ports:
      - "6379:6379"
    networks:
      - english-network

volumes:
  dbdata:

networks:
  english-network:
    driver: bridge
