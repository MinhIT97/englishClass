version: '3.8'

services:
  app:
    build:
      context: .
    restart: always
    volumes:
      - .:/var/www
    networks:
      - laravel_network
    depends_on:
      - redis
      - db

  web:
    image: nginx:stable-alpine
    restart: always
    ports:
      - "80:80"
    volumes:
      - .:/var/www
      - ./docker/nginx.conf:/etc/nginx/conf.d/default.conf
    networks:
      - laravel_network
    depends_on:
      - app

  queue:
    build: .
    restart: always
    command: php artisan queue:work redis --sleep=2 --tries=3 --timeout=60 --backoff=5
    volumes:
      - .:/var/www
    networks:
      - laravel_network
    depends_on:
      - redis
      - db

  reverb:
    build: .
    restart: always
    command: php artisan reverb:start --host=0.0.0.0 --port=8080
    ports:
      - "8080:8080"
    volumes:
      - .:/var/www
    networks:
      - laravel_network
    depends_on:
      - redis

  redis:
    image: redis:alpine
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru
    restart: always
    networks:
      - laravel_network

  db:
    image: mysql:8.0
    restart: always
    environment:
      MYSQL_DATABASE: ${DB_DATABASE}
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD}
    networks:
      - laravel_network

networks:
  laravel_network:
    driver: bridge
