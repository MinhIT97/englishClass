services:
  app:
    build:
      context: .
    restart: always
    volumes:
      - .:/var/www
    networks:
      - laravel_network
    depends_on:
      - redis
      - db
    env_file: .env
    environment:
      DB_HOST: db
      REDIS_HOST: redis

  web:
    image: nginx:stable-alpine
    restart: always
    ports:
      - "8081:80"
    volumes:
      - .:/var/www
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    networks:
      - laravel_network
    depends_on:
      - app

  queue:
    build: .
    restart: always
    command: php artisan queue:work redis --sleep=2 --tries=3 --timeout=60 --backoff=5
    volumes:
      - .:/var/www
    networks:
      - laravel_network
    depends_on:
      - redis
      - db
    env_file: .env
    environment:
      DB_HOST: db
      REDIS_HOST: redis

  reverb:
    build: .
    restart: always
    command: php artisan reverb:start --host=0.0.0.0 --port=8080
    ports:
      - "8080:8080"
    volumes:
      - .:/var/www
    networks:
      - laravel_network
    depends_on:
      - redis
    env_file: .env
    environment:
      REDIS_HOST: redis

  redis:
    image: redis:alpine
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru
    restart: always
    networks:
      - laravel_network

  db:
    image: mysql:8.0
    restart: always
    environment:
      MYSQL_DATABASE: ${DB_DATABASE}
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD}
    networks:
      - laravel_network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

networks:
  laravel_network:
    driver: bridge
