version: '3.9'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: english-class-app
    working_dir: /app
    volumes:
      # storage: user-generated files (uploads, sessions, logs, views)
      - app_storage:/app/storage
      # public_shared: populated by entrypoint.sh, đọc bởi Nginx
      - app_public:/app/public_shared
      # bootstrap/cache KHÔNG mount — dùng cache đã build trong image
    networks:
      - english-network
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    env_file:
      - .env
    restart: unless-stopped

  nginx:
    image: nginx:1.25-alpine
    container_name: english-class-nginx
    ports:
      - "8080:80"
    volumes:
      - app_public:/app/public:ro
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - english-network
    depends_on:
      - app
    restart: unless-stopped

  db:
    image: mysql:8.0
    container_name: english-class-db
    # Ép MySQL dùng native_password để tương thích với mọi client
    command: --default-authentication-plugin=mysql_native_password
    ports:
      - "3307:3306"
    environment:
      MYSQL_DATABASE: ${DB_DATABASE:-englishclass}
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-password}
    volumes:
      - dbdata:/var/lib/mysql
    networks:
      - english-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${DB_PASSWORD:-password}"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: english-class-redis
    ports:
      - "6379:6379"
    networks:
      - english-network
    restart: unless-stopped

volumes:
  dbdata:
  app_storage:
  app_public:

networks:
  english-network:
    driver: bridge
