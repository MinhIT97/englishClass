version: '3.9'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: english-class-app
    working_dir: /app
    volumes:
      # CHỈ mount storage (user-generated files) và public_shared (để Nginx đọc)
      # KHÔNG mount bootstrap/cache — để dùng cache đã build sẵn trong image
      - app_storage:/app/storage
      - app_public:/app/public_shared
    networks:
      - english-network
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    env_file:
      - .env
    restart: unless-stopped

  nginx:
    image: nginx:1.25-alpine
    container_name: english-class-nginx
    ports:
      - "8080:80"
    volumes:
      # Nginx đọc static files từ volume được App populate
      - app_public:/app/public:ro
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - english-network
    depends_on:
      - app
    restart: unless-stopped

  db:
    image: mysql:8.0
    container_name: english-class-db
    ports:
      - "3307:3306"
    environment:
      MYSQL_DATABASE: ${DB_DATABASE:-englishclass}
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-password}
    volumes:
      - dbdata:/var/lib/mysql
    networks:
      - english-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${DB_PASSWORD:-password}"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: english-class-redis
    ports:
      - "6379:6379"
    networks:
      - english-network
    restart: unless-stopped

volumes:
  dbdata:
  app_storage:
  app_public:

networks:
  english-network:
    driver: bridge
