version: '3.9'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: english-class-app
    working_dir: /app
    volumes:
      - .:/app
      - /app/vendor
      - app_storage:/app/storage
      - app_public:/app/public_shared
      - /app/public/build
    networks:
      - english-network
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    env_file: .env
    restart: unless-stopped

  queue:
    build:
      context: .
      dockerfile: Dockerfile
    working_dir: /app
    command: php artisan queue:work redis --sleep=2 --tries=3 --timeout=60
    volumes:
      - .:/app
      - /app/vendor
      - app_storage:/app/storage
      - /app/public/build
    networks:
      - english-network
    depends_on:
      redis:
        condition: service_started
      db:
        condition: service_healthy
    env_file: .env
    restart: unless-stopped

  reverb:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: english-class-reverb
    working_dir: /app
    command: php artisan reverb:start --host="0.0.0.0" --port=8080
    volumes:
      - .:/app
      - /app/vendor
      - /app/public/build
    env_file: .env
    networks:
      - english-network
    depends_on:
      redis:
        condition: service_started
    restart: unless-stopped

  nginx:
    image: nginx:1.25-alpine
    container_name: english-class-nginx
    ports:
      - "8080:80"
    volumes:
      - app_public:/app/public:ro
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - english-network
    depends_on:
      - app
    restart: unless-stopped

  db:
    image: mysql:8.0
    container_name: english-class-db
    command: --default-authentication-plugin=mysql_native_password
    ports:
      - "3307:3306"
    environment:
      MYSQL_DATABASE: ${DB_DATABASE:-englishclass}
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-password}
    volumes:
      - dbdata:/var/lib/mysql
    networks:
      - english-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${DB_PASSWORD:-password}"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: english-class-redis
    ports:
      - "6379:6379"
    networks:
      - english-network
    restart: unless-stopped

  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: english-class-cloudflared
    restart: unless-stopped
    command: tunnel --no-autoupdate run --token  ${CLOUDFLARE_TUNNEL_TOKEN}
    depends_on:
      - nginx

volumes:
  dbdata:
  app_storage:
  app_public:

networks:
  english-network:
    driver: bridge
