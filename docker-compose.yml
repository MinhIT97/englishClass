version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: englishClass_app
    restart: unless-stopped
    working_dir: /var/www/html
    volumes:
      - ./:/var/www/html
    networks:
      - englishclass-network
    depends_on:
      - db
      - redis

  web:
    image: nginx:alpine
    container_name: englishClass_web
    restart: unless-stopped
    ports:
      - "8000:80"
    volumes:
      - ./:/var/www/html
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    networks:
      - englishclass-network
    depends_on:
      - app

  db:
    image: mysql:8.0
    container_name: englishClass_db
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${DB_DATABASE:-english_class}
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-123456}
      MYSQL_PASSWORD: ${DB_PASSWORD:-123456}
      MYSQL_USER: ${DB_USERNAME:-root}
    volumes:
      - dbdata:/var/lib/mysql
    networks:
      - englishclass-network
    ports:
      - "3306:3306"

  redis:
    image: redis:alpine
    container_name: englishClass_redis
    restart: unless-stopped
    volumes:
      - redisdata:/data
    networks:
      - englishclass-network
    ports:
      - "6379:6379"

  queue:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: englishClass_queue
    restart: unless-stopped
    working_dir: /var/www/html
    command: php artisan queue:work --tries=3 --timeout=90
    volumes:
      - ./:/var/www/html
    networks:
      - englishclass-network
    depends_on:
      - app
      - redis
      - db

  reverb:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: englishClass_reverb
    restart: unless-stopped
    working_dir: /var/www/html
    command: php artisan reverb:start --host=0.0.0.0 --port=8082
    ports:
      - "8082:8082"
    volumes:
      - ./:/var/www/html
    networks:
      - englishclass-network
    depends_on:
      - app
      - redis

networks:
  englishclass-network:
    driver: bridge

volumes:
  dbdata:
  redisdata:
